name = "qommunity-otp"
main = "qommunity-otp-worker.js"
compatibility_date = "2026-06-21"

[[kv_namespaces]]
binding = "OTP_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
OTP_REGEX = "\\b\\d{4,8}\\b"
OTP_TTL_SECONDS = "600"
STORE_RAW_EMAIL = "false"
RAW_EMAIL_TTL_SECONDS = "600"
RAW_EMAIL_MAX_BYTES = "100000"
# Optional: keep a backup copy of forwarded OTP emails.
# FORWARD_TO = "your-backup@gmail.com"

# Set this as a secret, not a var:
# wrangler secret put OTP_READ_SECRET
